<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>MARKCHAT ❤️ AI EDITION</title>

<style>
body {
    font-family: 'Segoe UI', Arial, sans-serif;
    text-align: center;
    margin: 0;
    background-color: #ffeef0; 
    background-image: url('image_0.png');
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    color: #333;
    overflow-x: hidden;
}

/* 🧊 HUD PANEL */
#hud-profile {
    position: fixed; top: 20px; left: 20px;
    background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
    padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px;
    box-shadow: 0 8px 32px rgba(255, 75, 43, 0.2); z-index: 100;
    border: 1px solid rgba(255, 255, 255, 0.3);
}
.hud-avatar {
    width: 60px; height: 60px; background: #ff4b2b;
    clip-path: path('M 30,10 C 35,5 45,5 50,10 C 55,15 55,25 50,35 C 45,45 35,55 30,60 C 25,55 15,45 10,35 C 5,25 5,15 10,10 C 15,5 25,5 30,10 Z');
    display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; font-weight: bold;
}
.stats { font-size: 20px; font-weight: bold; }
.edit-btn { background: #ff4b2b; color: white; border: none; padding: 5px 12px; border-radius: 10px; font-size: 11px; cursor: pointer; }

/* ❤️ SRDIEČKA */
.hearts-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
.heart { position: absolute; bottom: -100px; animation: floatUp linear infinite; }
@keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
}

/* UI */
h1 { margin-top: 40px; color: #ff4b2b; font-size: 56px; font-weight: 900; position: relative; z-index: 2; }
#search { margin-top: 15px; padding: 15px; width: 300px; border-radius: 30px; border: 2px solid #ff4b2b; outline: none; position: relative; z-index: 2; }
#mojDivVJs { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; margin-top: 40px; padding: 40px; position: relative; z-index: 2; }

/* KARTY */
.card {
    background: white; width: 300px; height: 350px; cursor: pointer; transition: 0.4s;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    clip-path: path('M 150,50 C 180,20 240,20 270,50 C 300,80 300,140 260,200 C 230,250 180,290 150,310 C 120,290 70,250 40,200 C 0,140 0,80 30,50 C 60,20 120,20 150,50 Z');
    display:flex; flex-direction:column; overflow:hidden;
}
.card:hover { transform: scale(1.08); }
.card img { width:100%; height:70%; object-fit:cover; }
.card p { font-weight:bold; margin-top: 15px; font-size: 18px; }

/* MODAL & CHAT */
#modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display:none; justify-content:center; align-items:center; z-index: 9999; }
.modalContent { background: white; padding: 30px; border-radius: 30px; width: 90%; max-width: 850px; }
.profileLayout { display: flex; gap: 30px; text-align: left; }
.leftSide { width: 40%; text-align: center; }
.leftSide img { width: 100%; border-radius: 20px; }
#popisok { background: #fff0f2; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.85em; color: #666; font-style: italic; }

.rightSide { width: 60%; display: flex; flex-direction: column; }
#chatBox {
    height: 350px; overflow-y: auto; background: #fff;
    border: 1px solid #ffe0e5; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; gap: 12px;
}
.message { padding: 10px 16px; font-size: 14px; max-width: 85%; border-radius: 18px; }
.user { background: #ff4b2b; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
.bot { background: #eee; color: #444; align-self: flex-start; border-bottom-left-radius: 2px; }

#chatInputArea { display: flex; gap: 10px; margin-top: 15px; }
#chatInput { flex: 1; padding: 12px 20px; border-radius: 30px; border: 1px solid #eee; outline: none; }
.send-btn { background: #ff4b2b; color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; }

.close-btn { margin-top: 25px; background: #333; color: white; padding: 12px 30px; border: none; border-radius: 15px; cursor: pointer; width: 100%; }
</style>
</head>

<body>

<div id="hud-profile">
    <div class="hud-avatar">M</div>
    <div class="hud-info">
        <h4>Tvoj Profil</h4>
        <div class="stats">❤️ <span id="match-count">128</span></div>
        <button class="edit-btn">UPRAVIŤ</button>
    </div>
</div>

<div class="hearts-container" id="heartsContainer"></div>

<h1>MARKCHAT ❤️</h1>
<input id="search" placeholder="Hľadať spriaznenú dušu...">
<div id="mojDivVJs"></div>

<div id="modal">
    <div class="modalContent">
        <div class="profileLayout">
            <div class="leftSide">
                <img id="modalImg">
                <h2 id="personName"></h2>
                <div id="popisok"></div>
            </div>
            <div class="rightSide">
                <div id="chatBox"></div>
                <div id="chatInputArea">
                    <input id="chatInput" placeholder="Napíš správu...">
                    <button class="send-btn" onclick="posliSpravu()">➤</button>
                </div>
            </div>
        </div>
        <button class="close-btn" onclick="zatvorModal()">ZATVORIŤ CHAT</button>
    </div>
</div>

<script>
const mojDivVJs = document.getElementById("mojDivVJs")
const search = document.getElementById("search")
const modal = document.getElementById("modal")
const personName = document.getElementById("personName")
const modalImg = document.getElementById("modalImg")
const popisok = document.getElementById("popisok")
const chatBox = document.getElementById("chatBox")
const chatInput = document.getElementById("chatInput")

let vsetciLudia = []
let aktualnaPostava = null;

// ✨ TU JE TÁ ZMENA: Adresa tvojho backendu na Renderi
const BACKEND_URL = "https://beckend-1-1fk0.onrender.com";

async function nacitajLudi(){
    try {
        const res = await fetch(`${BACKEND_URL}/students`);
        const data = await res.json();
        vsetciLudia = data.students;
        zobrazLudi(vsetciLudia);
    } catch(e) {
        console.error("Chyba:", e);
        mojDivVJs.innerHTML = `<p style="color:red; font-weight:bold;">Nepodarilo sa načítať ľudí 😰 Checkni konzolu.</p>`;
    }
}

function zobrazLudi(list){
    mojDivVJs.innerHTML=""
    list.forEach(c=>{
        const card=document.createElement("div"); card.classList.add("card")
        if(c.image){ const img=document.createElement("img"); img.src=c.image; card.appendChild(img) }
        const p=document.createElement("p"); p.textContent=c.name+" "+c.surname; card.appendChild(p)
        card.onclick=()=>otvorCloveka(c)
        mojDivVJs.appendChild(card)
    })
}

function otvorCloveka(c){
    aktualnaPostava = c;
    modal.style.display="flex"
    personName.textContent=c.name+" "+c.surname
    modalImg.src=c.image
    popisok.textContent = c.personality;
    chatBox.innerHTML = `<div class="message bot">Ahoj! Ja som ${c.name}. Napíš mi niečo... 😉</div>`;
}

function zatvorModal(){ modal.style.display="none" }

async function posliSpravu(){
    const text = chatInput.value;
    if(!text.trim()) return;

    pridaj(text, "user");
    chatInput.value = "";

    try {
        const response = await fetch(`${BACKEND_URL}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                message: text,
                character: aktualnaPostava,
                mood: "neutral"
            })
        });

        const data = await response.json();
        
        if(data.reply) {
            setTimeout(() => {
                pridaj(data.reply, "bot");
            }, 300);
        } else {
            pridaj("AI sa zasekla 💀 (Skontroluj kredit na OpenAI)", "bot");
        }

    } catch (error) {
        console.error("Chyba:", error);
        pridaj("Backend neodpovedá... Skontroluj logy na Renderi. 💀", "bot");
    }
}

function pridaj(text, typ){
    const msg = document.createElement("div"); msg.classList.add("message", typ); msg.textContent = text
    chatBox.appendChild(msg); chatBox.scrollTop = chatBox.scrollHeight
}

chatInput.onkeydown = (e) => { if(e.key === "Enter") posliSpravu() }

// SRDIEČKA
function vytvorSrdiecko(){
    const container = document.getElementById("heartsContainer");
    if(!container) return;
    const heart = document.createElement("div");
    heart.classList.add("heart"); heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
    container.appendChild(heart);
    setTimeout(() => heart.remove(), 7000);
}
setInterval(vytvorSrdiecko, 300);

search.oninput = () => {
    const t = search.value.toLowerCase()
    zobrazLudi(vsetciLudia.filter(c => (c.name+" "+c.surname).toLowerCase().includes(t)))
}

nacitajLudi();
</script>
</body>
</html>
