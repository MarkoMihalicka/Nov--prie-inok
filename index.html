<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>MARKCHAT ❤️</title>
<style>
/* --- NASTAVENIE POZADIA (Nemeníme) --- */
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    /* Tu priraďujeme tvoj obrázok ako pozadie */
    background-image: url('image_0.png'); /* <--- ZMEŇ NÁZOV SÚBORU AK TREBA */
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    color: #333;
}

/* --- ÚPRAVA OSTATNÝCH PRVKOV (Nemeníme) --- */
h1 {
    margin-top: 40px;
    color: #ff4b2b;
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
}

#search {
    margin-top: 15px;
    padding: 12px;
    font-size: 16px;
    width: 280px;
    border-radius: 20px;
    border: 2px solid #ff4b2b;
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

#search:focus {
    outline: none;
    box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
}

#mojDivVJs {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    padding: 20px;
}

/* --- TVAR SRDCA A VEĽKOSŤ (Nemeníme) --- */
.card {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.98) 0%, rgba(255, 240, 240, 0.95) 100%);
    width: 350px; 
    height: 350px; 
    cursor: pointer;
    transition: transform 0.3s ease, background 0.3s ease;
    border: none;
    
    /* Clip-path pre tvar srdca */
    clip-path: path('M 175,56 C 206,24 270,24 302,56 C 334,87 334,151 286,214 C 254,262 206,310 175,334 C 143,310 95,262 63,214 C 16,151 16,87 48,56 C 80,24 143,24 175,56 Z');
    
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
    padding: 0;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
}

/* --- OBRÁZOK VO VNÚTRI KARTY - TU JE ZMENA --- */
.card img {
    width: 100%;
    height: 70%;
    object-fit: cover; /* Vyplní plochu */
    
    /* --- NOVÝ POSUN VÝREZU --- */
    /* object-position: horizontal vertical. Default je 50% 50% (stred).
       Nastavením 50% (stred horizontálne) a 10% (veľmi vysoko vertikálne)
       posunieme výrez obrázka smerom nadol, čo zobrazí hornú časť fotky (hlavu).
       Skúšaj hodnoty od 0% do 20% podľa potreby. */
    object-position: 50% 10%; 

    border-radius: 0;
    margin-bottom: 0;
}

.card p {
    font-weight: bold;
    margin: 15px 15px;
    color: #555;
    font-size: 20px;
    text-align: center;
    line-height: 1.2;
    flex-grow: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* MODAL - (Nemeníme) */
#modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modalContent {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

#modal h2 {
    color: #ff4b2b;
    margin-top: 0;
}

#modal img {
    width: 180px;
    border-radius: 15px;
    margin: 15px 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

#popisok {
    font-size: 17px;
    font-style: italic;
    color: #444;
    margin: 20px 0;
    padding: 15px;
    background: #fff5f3;
    border-radius: 10px;
    border-left: 5px solid #ff4b2b;
}

button {
    padding: 12px 24px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(to right, #ff416c, #ff4b2b);
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 5px 10px rgba(255, 75, 43, 0.3);
}

button:hover {
    box-shadow: 0 8px 15px rgba(255, 75, 43, 0.5);
}

button:active {
    transform: scale(0.96);
}
</style>
</head>
<body>

<h1>MARKCHAT ❤️</h1>
<input id="search" placeholder="Hľadať človeka...">
<div id="mojDivVJs"></div>

<div id="modal">
<div class="modalContent">
<h2 id="personName"></h2>
<img id="modalImg" src="" alt="">
<div id="popisok"></div>
<br>
<button onclick="zatvorModal()">Zatvoriť</button>
</div>
</div>

<script>
// (Tu ostáva tvoj pôvodný JavaScript kód, ten sme nemenili)
const mojDivVJs = document.getElementById("mojDivVJs")
const search = document.getElementById("search")
const modal = document.getElementById("modal")
const personName = document.getElementById("personName")
const modalImg = document.getElementById("modalImg")
const popisok = document.getElementById("popisok")

let vsetciLudia = []

// Databáza originálnych viet
const vtipneVetyOriginal = [
    "Miluje pizzu s ananásom a nehanbí sa za to. 🍕",
    "Ráno nevstane bez dvoch káv, inak pohryzie. ☕",
    "Hľadá niekoho, kto s ním pôjde na hory a nezomrie. 🏔️",
    "V noci programuje, cez deň spí. Klasika. 💻",
    "Ak neznášaš ticho, sme ideálny pár. Ja neprestávam rozprávať. 🗣️",
    "Vraj viem variť, ale moji priatelia to zatiaľ neprežili. 🍳",
    "Môj najväčší talent je, že viem zaspať do 30 sekúnd. 😴",
    "Hľadám parťáka na pozeranie Netflixu a objednávanie jedla. 🎬",
    "Moje koníčky zahŕňajú dýchanie a vyhýbanie sa dospeláckym povinnostiam. 🤷‍♂️",
    "Profík v prokrastinácii a hľadaní stratených ponožiek. 🧦",
    "Ak hľadáš niekoho normálneho, swipe-ni radšej doľava. 🤪",
    "Viem robiť tie najlepšie palacinky na svete. Možno. 🥞",
    "Odpovedám na správy buď do 2 sekúnd, alebo do 3 pracovných dní. ⏳",
    "Môj pes ma má radšej ako ty kedy budeš. 🐶"
]

// Pomocný zoznam, z ktorého budeme vety vyberať
let vetyNaVyber = [...vtipneVetyOriginal]

async function nacitajLudi(){
    try{
        const response = await fetch("https://markomihalicka.github.io/moj-prvy-backend/data.json")
        const data = await response.json()
        
        // Pri načítaní každému človeku napevno priradíme náhodnú unikátnu vetu
        vsetciLudia = data.students.map(clovek => {
            // Ak sme už minuli všetky vety, načítame ich do osudia znova
            if (vetyNaVyber.length === 0) {
                vetyNaVyber = [...vtipneVetyOriginal]
            }
            
            const nahodnyIndex = Math.floor(Math.random() * vetyNaVyber.length)
            const vybranaVeta = vetyNaVyber[nahodnyIndex]
            
            // Vymažeme ju, aby ju nedostal nikto iný
            vetyNaVyber.splice(nahodnyIndex, 1)
            
            // Vrátime človeka obohateného o jeho unikátny popisok
            return { ...clovek, popis: vybranaVeta }
        })
        
        zobrazLudi(vsetciLudia)
    }catch(err){
        console.error("Chyba pri načítaní dát:", err)
        mojDivVJs.innerHTML = "<p style='color:#ff4b2b; font-weight:bold; background:white; padding:10px; border-radius:10px;'>Nepodarilo sa načítať ľudí 😢 Checkni konzolu.</p>"
    }
}

function zobrazLudi(zoznam){
    mojDivVJs.innerHTML=""
    zoznam.forEach((clovek)=>{
        const card = document.createElement("div")
        card.classList.add("card")
        if(clovek.image){
            const img = document.createElement("img")
            img.src = clovek.image
            img.alt = clovek.name
            card.appendChild(img)
        }
        const nazov = document.createElement("p")
        nazov.textContent = clovek.name + " " + clovek.surname; 
        card.appendChild(nazov)
        card.onclick = () => otvorCloveka(clovek)
        mojDivVJs.appendChild(card)
    })
}

function otvorCloveka(clovek){
    personName.textContent = clovek.name + " " + clovek.surname + " - " + clovek.nickname
    if(clovek.image) modalImg.src = clovek.image
    modal.style.display="flex"
    
    // Tu len jednoducho vytiahneme vetu, ktorú sme mu pridelili pri načítaní
    popisok.textContent = clovek.popis
}

function zatvorModal(){
    modal.style.display="none"
}

search.addEventListener("input", ()=>{
    const text = search.value.toLowerCase()
    const filtrovane = vsetciLudia.filter(clovek =>
        (clovek.name + " " + clovek.surname + " " + clovek.nickname).toLowerCase().includes(text)
    )
    zobrazLudi(filtrovane)
})

nacitajLudi()
</script>
</body>
</html>
