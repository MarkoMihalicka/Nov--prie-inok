<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>MARKCHAT ❤️</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    background-image: url('image_0.png');
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    color: #333;
}

/* SRDIEČKA */
.hearts {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    top: 0;
    left: 0;
    z-index: 0;
}

.heart {
    position: absolute;
    bottom: -50px;
    font-size: 24px;
    color: rgba(255, 75, 43, 0.6);
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity:1; }
    100% { transform: translateY(-110vh); opacity:0; }
}

h1 {
    margin-top: 40px;
    color: #ff4b2b;
    font-size: 48px;
    position: relative;
    z-index: 1;
}

#search {
    margin-top: 15px;
    padding: 12px;
    width: 280px;
    border-radius: 20px;
    border: 2px solid #ff4b2b;
    position: relative;
    z-index: 1;
}

#mojDivVJs {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 40px;
    margin-top: 40px;
    position: relative;
    z-index: 1;
}

/* KARTY */
.card {
    background: white;
    width: 300px;
    height: 300px;
    cursor: pointer;
    clip-path: path('M 150,50 C 180,20 240,20 270,50 C 300,80 300,140 260,200 C 230,250 180,290 150,310 C 120,290 70,250 40,200 C 0,140 0,80 30,50 C 60,20 120,20 150,50 Z');
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

.card img {
    width:100%;
    height:70%;
    object-fit:cover;
    object-position:50% 10%;
}

.card p {
    font-weight:bold;
}

/* MODAL */
#modal {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modalContent {
    background:white;
    padding:20px;
    border-radius:20px;
    width:350px;
}

#chatBox {
    height:150px;
    overflow-y:auto;
    background:#fff0f0;
    border-radius:10px;
    padding:10px;
}

.message {
    padding:8px;
    margin:5px;
    border-radius:10px;
    max-width:70%;
}

.user {
    background:#ff4b2b;
    color:white;
    margin-left:auto;
}

.bot {
    background:#eee;
}

#chatInputArea {
    display:flex;
    gap:5px;
    margin-top:10px;
}

#chatInput {
    flex:1;
    padding:10px;
}

button {
    padding:10px;
    background:#ff4b2b;
    color:white;
    border:none;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<h1>MARKCHAT ❤️</h1>
<input id="search" placeholder="Hľadať...">
<div id="mojDivVJs"></div>

<div id="modal">
<div class="modalContent">
<h2 id="personName"></h2>
<img id="modalImg" width="150">
<div id="popisok"></div>

<div id="chatBox"></div>

<div id="chatInputArea">
<input id="chatInput" placeholder="Napíš správu...">
<button onclick="posliSpravu()">Odoslať</button>
</div>

<br>
<button onclick="zatvorModal()">Zatvoriť</button>
</div>
</div>

<script>
const mojDivVJs = document.getElementById("mojDivVJs")
const search = document.getElementById("search")
const modal = document.getElementById("modal")
const personName = document.getElementById("personName")
const modalImg = document.getElementById("modalImg")
const popisok = document.getElementById("popisok")
const chatBox = document.getElementById("chatBox")
const chatInput = document.getElementById("chatInput")

let vsetciLudia = []

const vety = [
"Miluje pizzu 🍕",
"Ráno bez kávy nefunguje ☕",
"Hľadá lásku ❤️",
"Spí celý deň 😴",
"Miluje Netflix 🎬"
]

async function nacitajLudi(){
    const response = await fetch("https://markomihalicka.github.io/moj-prvy-backend/data.json")
    const data = await response.json()

    vsetciLudia = data.students.map(c => {
        return {...c, popis: vety[Math.floor(Math.random()*vety.length)]}
    })

    zobrazLudi(vsetciLudia)
}

function zobrazLudi(list){
    mojDivVJs.innerHTML=""
    list.forEach(c=>{
        const card = document.createElement("div")
        card.classList.add("card")

        const img = document.createElement("img")
        img.src = c.image
        card.appendChild(img)

        const p = document.createElement("p")
        p.textContent = c.name
        card.appendChild(p)

        card.onclick=()=>otvorCloveka(c)
        mojDivVJs.appendChild(card)
    })
}

function otvorCloveka(c){
    modal.style.display="flex"
    personName.textContent = c.name
    modalImg.src = c.image
    popisok.textContent = c.popis
    chatBox.innerHTML=""
}

function zatvorModal(){
    modal.style.display="none"
}

function posliSpravu(){
    if(chatInput.value==="") return

    pridaj(chatInput.value,"user")
    chatInput.value=""

    setTimeout(()=>{
        pridaj("Haha 😄","bot")
    },1000)
}

function pridaj(text,typ){
    const msg=document.createElement("div")
    msg.classList.add("message",typ)
    msg.textContent=text
    chatBox.appendChild(msg)
    chatBox.scrollTop=chatBox.scrollHeight
}

search.addEventListener("input",()=>{
    const t=search.value.toLowerCase()
    zobrazLudi(vsetciLudia.filter(c=>c.name.toLowerCase().includes(t)))
})

function vytvorSrdiecka(){
    setInterval(()=>{
        const heart=document.createElement("div")
        heart.classList.add("heart")
        heart.innerHTML="❤️"
        heart.style.left=Math.random()*100+"vw"
        document.getElementById("hearts").appendChild(heart)

        setTimeout(()=>heart.remove(),6000)
    },300)
}

vytvorSrdiecka()
nacitajLudi()
</script>

</body>
</html>
